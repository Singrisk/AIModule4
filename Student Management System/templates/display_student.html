<!DOCTYPE html>
<html>
<head>
    <title>All Students</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h1>All Students</h1>

<table>

<tr>

<th>Roll No</th>

<th>Name</th>

<th>Age</th>

<th>Course</th>

</tr>

{% for student in students %}

<tr>

<td>{{ student.Roll_no }}</td>

<td>{{ student.Name }}</td>

<td>{{ student.Age }}</td>

<td>{{ student.Course }}</td>

</tr>

{% endfor %}

</table>

<a href="/">⬅ Home</a>

</div>

</body>
</html>
